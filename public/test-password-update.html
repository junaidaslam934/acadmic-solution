<!DOCTYPE html>
<html>
<head>
    <title>Update Passwords</title>
</head>
<body>
    <h1>Update Database Passwords</h1>
    <button onclick="updatePasswords()">Update All Passwords to "qwerty"</button>
    <div id="result"></div>

    <script>
        async function updatePasswords() {
            try {
                const response = await fetch('/api/add-passwords', {
                    method: 'POST'
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
